name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Which semantic version part to bump"
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure manual releases run from main
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::Manual releases must be run from main, not ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Compute release version
        id: release-version
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail

          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          echo "Latest tag: $latest"

          # Enforce that the most recent tag is strict semver so the bump
          # produces a well-formed version.
          if ! [[ "$latest" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Latest tag '$latest' is not a strict vMAJOR.MINOR.PATCH version"
            exit 1
          fi
          major=${BASH_REMATCH[1]}
          minor=${BASH_REMATCH[2]}
          patch=${BASH_REMATCH[3]}

          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new_tag="v${major}.${minor}.${patch}"
          echo "New tag: $new_tag"

          if git rev-parse "$new_tag" >/dev/null 2>&1; then
            echo "::error::Tag $new_tag already exists"
            exit 1
          fi

          echo "tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "version=${new_tag#v}" >> "$GITHUB_OUTPUT"

      - name: Tag release from main
        if: github.event_name == 'workflow_dispatch'
        env:
          NEW_TAG: ${{ steps.release-version.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Tag the current main HEAD directly. The docs snapshot lands later
          # via a pull request because main is a protected branch that cannot
          # be pushed to from CI, so only the tag is pushed here.
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"
          git checkout "$NEW_TAG"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Set up Node
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install docs dependencies
        if: github.event_name == 'workflow_dispatch'
        run: npm ci
        working-directory: website

      - name: Snapshot docs version
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ steps.release-version.outputs.version }}
        run: npm run docusaurus -- docs:version "$VERSION"
        working-directory: website

      - name: Open docs snapshot pull request
        if: github.event_name == 'workflow_dispatch'
        env:
          NEW_TAG: ${{ steps.release-version.outputs.tag }}
          # Token must have PR read/write permissions, contents read/write permissions
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
        run: |
          set -euo pipefail

          # The versioned docs snapshot must land on the protected main branch,
          # which only accepts pull requests. Open one instead of pushing.
          branch="docs/snapshot-${NEW_TAG}"
          git checkout -b "$branch"
          git add website/versioned_docs website/versioned_sidebars website/versions.json
          if git diff --cached --quiet; then
            echo "::error::Docs version snapshot did not create any changes"
            exit 1
          fi
          git commit -m "docs: snapshot ${NEW_TAG}"
          git push origin "$branch"
          pr_url=$(gh pr create \
            --base main \
            --head "$branch" \
            --title "docs: snapshot ${NEW_TAG}" \
            --body "Automated Docusaurus version snapshot for release ${NEW_TAG}. Merge to publish the versioned docs site.")
          gh pr merge --auto --squash --delete-branch "$pr_url"
